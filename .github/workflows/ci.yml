name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: verify (${{ matrix.architecture }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: arm64
            runner: macos-15
          - architecture: x86_64
            runner: macos-15-intel
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.4.app/Contents/Developer
      MACOSX_DEPLOYMENT_TARGET: "14.0"
      LONGVIEW_EXPECTED_ARCH: ${{ matrix.architecture }}
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Verify public project
        shell: zsh
        run: |
          set -euo pipefail
          sw_vers
          swift --version
          git diff --check
          sh -n scripts/install.sh scripts/update.sh scripts/uninstall.sh scripts/lib/distribution.sh
          scripts/verify-cli.sh
