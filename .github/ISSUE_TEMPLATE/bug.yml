name: Bug report
description: Report a reproducible Longview defect using synthetic or redacted data.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not attach real screenshots, window titles, chats, email, credentials, or private desktop data. Security issues belong in a private advisory.
  - type: input
    id: version
    attributes:
      label: Longview version
      description: Output of `longview version`.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: macOS version and architecture from `longview doctor`.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Synthetic reproduction
      description: Minimal commands and fixture state that reproduce the problem.
    validations:
      required: true
  - type: textarea
    id: result
    attributes:
      label: Expected and actual result
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed private screen content, names, titles, paths, and identifiers.
          required: true
