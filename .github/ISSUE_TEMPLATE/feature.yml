name: Feature request
description: Propose a capability without expanding Longview into general automation.
title: "feature: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What agent workflow is blocked today?
    validations:
      required: true
  - type: textarea
    id: contract
    attributes:
      label: Proposed contract
      description: Describe inputs, machine-readable outputs, failure behavior, and restoration semantics.
    validations:
      required: true
  - type: checkboxes
    id: boundaries
    attributes:
      label: Boundary check
      options:
        - label: This does not require runtime networking, OCR, click, keyboard, clipboard, hidden UI, or private APIs.
          required: true
